# No [[services]] block → no public IP; exit node + proxy are tailnet-only.
app = "exit-node-enqp"
primary_region = "sjc"

[env]
  TS_HOSTNAME = "fly-us-exit"

[build]
  dockerfile = "Dockerfile"

# persist tailscaled state for a stable identity/IP; one volume keeps it single-machine
[[mounts]]
  source = "ts_state"
  destination = "/var/lib/tailscale"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
